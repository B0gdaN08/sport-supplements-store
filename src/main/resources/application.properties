server.port=3000
spring.application.name=sport-supplements-store

# Disable default UserDetailsService (we use JWT)
spring.security.user.password=disabled

# JWT
app.jwt.secret=sportsupps-jwt-secret-key-distributed-systems-2024-very-long-key
app.jwt.expiration=86400000

# Static resources
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# H2 Database (file-based for persistence)
spring.datasource.url=jdbc:h2:file:./data/sportsupps;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.com.sportsupps=INFO
