<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found · SportSupps</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .error-code {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(100px, 20vw, 180px);
      font-weight: 800;
      line-height: 1;
      color: var(--accent);
      opacity: 0.15;
      user-select: none;
    }
    .error-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 700;
      text-transform: uppercase;
      margin-top: -20px;
      margin-bottom: 16px;
    }
    .error-msg {
      color: var(--text-muted);
      font-size: 16px;
      max-width: 400px;
      margin-bottom: 36px;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not <span style="color:var(--accent)">Found</span></h1>
    <p class="error-msg">
      The page you are looking for does not exist or has been moved.
      Head back to the store and keep lifting.
    </p>
    <div class="btn-group" style="justify-content:center;">
      <a href="/" class="btn btn-primary btn-lg">↩ Back to Home</a>
      <a href="/products.html" class="btn btn-secondary btn-lg">Browse Products</a>
    </div>
  </div>
</body>
</html>
