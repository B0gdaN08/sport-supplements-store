<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users — SportSupps Store</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/" class="navbar-brand">Sport<span>Supps</span></a>
      <div class="nav-links">
        <a href="/" class="nav-link">Home</a>
        <a href="/categories.html" class="nav-link">Categories</a>
        <a href="/products.html" class="nav-link">Products</a>
        <a href="/orders.html" class="nav-link">Orders</a>
        <a href="/users.html" class="nav-link active">Users</a>
      </div>
      <div id="navUser"></div>
    </div>
  </nav>

  <div class="toast-container" id="toastContainer"></div>

  <main>
    <div class="container">
      <div class="page-header">
        <h1>Registered <span>Users</span></h1>
        <p>Registry of all user accounts in the system.</p>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">All Users</span>
          <button class="btn btn-ghost btn-sm" onclick="loadUsers()">↻ Refresh</button>
        </div>
        <div class="panel-body" style="padding:0;">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Username</th>
                  <th>Role</th>
                  <th>Registered</th>
                </tr>
              </thead>
              <tbody id="usersTableBody">
                <tr><td colspan="5" style="text-align:center;padding:40px;"><span class="spinner"></span></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer class="footer">
    <div class="container">
      SportSupps Store · <span>Distributed Systems</span> · University Project
    </div>
  </footer>

  <script src="/js/auth.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!requireAdmin()) return;
      renderNavAuth();
      loadUsers();
    });

    async function loadUsers() {
      const tbody = document.getElementById('usersTableBody');
      tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:40px;"><span class="spinner"></span></td></tr>`;

      const { ok, data } = await apiFetch('/api/auth/users');
      if (!ok) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--red);">${escHtml(data.error)}</td></tr>`;
        return;
      }

      const users = data.data || [];
      if (!users.length) {
        tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">👤</div><h3>No users found</h3></div></td></tr>`;
        return;
      }

      tbody.innerHTML = users.map(u => `
        <tr>
          <td><span class="id-chip">#${u.id}</span></td>
          <td><strong>${escHtml(u.name)}</strong></td>
          <td><code>${escHtml(u.username)}</code></td>
          <td>
            <span class="badge ${u.role === 'admin' ? 'badge-green' : 'badge-blue'}">
              ${u.role}
            </span>
          </td>
          <td>${formatDate(u.createdAt)}</td>
        </tr>
      `).join('');
    }
  </script>
</body>
</html>
